<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Consulta Deportistas</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.1.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --ios-bg: #f2f2f7; --header-bg: #ffffff; --accent-green: #34c759; --accent-blue: #007aff; --error-red: #ff3b30; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--ios-bg); margin: 0; transition: background 0.3s ease; }
        
        /* PANTALLA DE LOGIN */
        #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--ios-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; padding: 20px; box-sizing: border-box; }
        .login-card { background: white; padding: 30px 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 320px; text-align: center; }
        .login-card h2 { margin-top: 0; font-size: 22px; font-weight: 600; margin-bottom: 20px; }
        .login-input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #c6c6c8; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }
        .login-btn { background: var(--accent-blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .error-msg { color: var(--error-red); font-size: 14px; margin-top: 10px; display: none; }
        .loading-msg { color: var(--accent-blue); font-size: 14px; margin-top: 10px; display: none; }

        /* CONTENIDO DE LA APP */
        #appContent { display: none; padding-top: 70px; }
        
        /* Barra de búsqueda */
        .sticky-header { position: fixed; top: 0; left: 0; right: 0; padding: 15px; background: var(--header-bg); border-bottom: 0.5px solid #c6c6c8; z-index: 100; }
        .search-input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #e5e5ea; font-size: 16px; box-sizing: border-box; }
        
        /* Tabla */
        .table-container { overflow-x: auto; padding: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 14px; white-space: nowrap; }
        th { background: #f9f9f9; font-weight: 600; color: #8e8e93; }
        
        .match-row { background-color: rgba(52, 199, 89, 0.2); }
        .copy-btn { background: none; border: none; font-size: 16px; cursor: pointer; padding: 4px 8px; margin: 0; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h2>Acceso Privado</h2>
        <input type="text" id="userInput" class="login-input" placeholder="Usuario" autocapitalize="none" autocorrect="off">
        <input type="password" id="passInput" class="login-input" placeholder="Contraseña">
        <button id="loginBtn" class="login-btn">Entrar</button>
        <div id="errorMsg" class="error-msg">Usuario o contraseña incorrectos.</div>
        <div id="loadingMsg" class="loading-msg">Sincronizando base de datos...</div>
    </div>
</div>

<div id="appContent">
    <div class="sticky-header">
        <input type="text" id="searchInput" class="search-input" placeholder="Buscar por nombre o RUT...">
    </div>

    <div class="table-container">
        <table id="resultsTable">
            <thead>
                <tr><th></th><th>Nombre</th><th>RUT</th><th>Fecha Nac.</th><th>Previsión</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // =========================================================
    // ¡REEMPLAZA ESTE BLOQUE CON TUS CREDENCIALES DE FIREBASE!
const firebaseConfig = {
  apiKey: "AIzaSyC7QyTMTRl2WdvuK5hf-uzIv-RPr0s5-h8",
  authDomain: "buscador-c85db.firebaseapp.com",
  projectId: "buscador-c85db",
  storageBucket: "buscador-c85db.firebasestorage.app",
  messagingSenderId: "1083903045830",
  appId: "1:1083903045830:web:8cf9259e2d144dd112e7c7"
};
    // =========================================================

    firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();
    var db = firebase.firestore();
    var dataset = [];

    var loginScreen = document.getElementById('loginScreen');
    var appContent = document.getElementById('appContent');
    var userInput = document.getElementById('userInput');
    var passInput = document.getElementById('passInput');
    var loginBtn = document.getElementById('loginBtn');
    var errorMsg = document.getElementById('errorMsg');
    var loadingMsg = document.getElementById('loadingMsg');
    var searchInput = document.getElementById('searchInput');
    var tableBody = document.getElementById('tableBody');

    auth.onAuthStateChanged(function(user) {
        if (user) {
            userInput.style.display = "none";
            passInput.style.display = "none";
            loginBtn.style.display = "none";
            errorMsg.style.display = "none";
            loadingMsg.style.display = "block";
            bajarBaseDeDatos();
        } else {
            loginScreen.style.display = "flex";
            userInput.style.display = "block";
            passInput.style.display = "block";
            loginBtn.style.display = "block";
            appContent.style.display = "none";
            loadingMsg.style.display = "none";
        }
    });

    function ejecutarLogin() {
        var username = userInput.value.trim();
        var password = passInput.value;
        if (!username || !password) return;
        errorMsg.style.display = "none";
        loadingMsg.style.display = "block";

        auth.signInWithEmailAndPassword(username, password)
        .catch(function(error) {
            loadingMsg.style.display = "none";
            errorMsg.style.display = "block";
            passInput.value = "";
        });
    }

    loginBtn.addEventListener('click', ejecutarLogin);
    passInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') ejecutarLogin();
    });

    function bajarBaseDeDatos() {
        db.collection("deportistas").get()
        .then(function(querySnapshot) {
            dataset = [];
            querySnapshot.forEach(function(doc) {
                var d = doc.data();
                dataset.push({
                    nombre: d.nombre,
                    rut: d.rut,
                    fecha: d.fechaNacimiento,
                    prevision: d.prevision
                });
            });
            loginScreen.style.display = "none";
            appContent.style.display = "block";
        })
        .catch(function(error) {
            loadingMsg.style.display = "none";
            errorMsg.textContent = "Error de sincronización.";
            errorMsg.style.display = "block";
            auth.signOut();
        });
    }

    function normalizeText(str) {
        if (!str) return "";
        var map = { 'á': 'a', 'é': 'e', 'í': 'i', 'ó': 'o', 'ú': 'u', 'Á': 'a', 'É': 'e', 'Í': 'i', 'Ó': 'o', 'Ú': 'u', 'ü': 'u', 'Ü': 'u', 'ñ': 'n', 'Ñ': 'n' };
        var res = str.toLowerCase();
        var salida = "";
        for (var i = 0; i < res.length; i++) { salida += map[res.charAt(i)] || res.charAt(i); }
        return salida;
    }

    searchInput.addEventListener('input', function() {
        var val = normalizeText(searchInput.value);
        var terms = val.split(' ').filter(function(t) { return t.length > 0; });
        
        if (val === "") {
            document.body.style.backgroundColor = 'var(--ios-bg)';
            tableBody.innerHTML = '';
            return;
        }

        var filtered = dataset.filter(function(item) {
            var rowStr = normalizeText(item.nombre + " " + item.rut);
            return terms.every(function(term) { return rowStr.indexOf(term) !== -1; });
        });

        if (filtered.length === 0) {
            document.body.style.backgroundColor = 'var(--error-red)';
            tableBody.innerHTML = '';
        } else {
            document.body.style.backgroundColor = 'var(--ios-bg)';
            var displayData = filtered.slice(0, 5);
            var html = "";
            
            for (var j = 0; j < displayData.length; j++) {
                var item = displayData[j];
                var nomEsc = item.nombre.replace(/'/g, "\\'");
                var rutEsc = item.rut.replace(/'/g, "\\'");
                var fecEsc = item.fecha.replace(/'/g, "\\'");
                var prevEsc = item.prevision.replace(/'/g, "\\'");

                html += '<tr class="match-row">' +
                        '<td><button class="copy-btn" onclick="copiarFila(this, \''+nomEsc+'\', \''+rutEsc+'\', \''+fecEsc+'\', \''+prevEsc+'\')">📋</button></td>' +
                        '<td>' + item.nombre + '</td>' +
                        '<td>' + item.rut + '</td>' +
                        '<td>' + item.fecha + '</td>' +
                        '<td>' + item.prevision + '</td>' +
                    '</tr>';
            }
            tableBody.innerHTML = html;
        }
    });

    function copiarFila(btn, nombre, rut, fecha, prevision) {
    var textoParaCopiar = "Nombre: " + nombre + "\nRUT: " + rut + "\nFecha Nac: " + fecha + "\nPrevisión: " + prevision;
    
    // Forzamos el método tradicional si detecta que estamos en un entorno inseguro o PC restrictiva
    if (window.isSecureContext && navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(textoParaCopiar)
            .then(mostrarExito)
            .catch(function() { ejecutarFallback(textoParaCopiar); });
    } else {
        ejecutarFallback(textoParaCopiar);
    }

    function ejecutarFallback(texto) {
        var textArea = document.createElement("textarea");
        textArea.value = texto;
        // Prevenimos scroll visual e intentamos que sea invisible
        textArea.style.position = "fixed";
        textArea.style.left = "-9999px"; 
        document.body.appendChild(textArea);
        
        // Selección específica para asegurar el foco en PC
        textArea.focus();
        textArea.select();
        
        try {
            var exitoso = document.execCommand('copy');
            if (exitoso) mostrarExito();
        } catch (err) {
            console.error('Error en el método alternativo de copia:', err);
        }
        document.body.removeChild(textArea);
    }

    function mostrarExito() {
        var iconoOriginal = btn.textContent;
        btn.textContent = "✅";
        setTimeout(function() { btn.textContent = iconoOriginal; }, 1200);
    }
}
</script>
</body>
</html>
